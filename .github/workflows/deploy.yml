name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers the action every time you push to the main branch

    
# Fixes the Node 20 deprecation warning by forcing the runner to use Node 24 environment settings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # Matches your local pnpm environment

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build and Export with Next.js
        run: pnpm build

      - name: Upload Production Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js static output folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4